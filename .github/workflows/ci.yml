name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # package-lock.json is built with npm 11; Node 22 images ship npm 10 and `npm ci` fails.
      - name: Use npm 11
        run: npm install -g npm@11.6.2

      - uses: actions/cache@v5
        with:
          path: .data/vesum
          key: vesum-${{ runner.os }}-${{ hashFiles('scripts/dictionary/fetch-vesum.ts', 'scripts/dictionary/build-dictionary.ts') }}
          restore-keys: |
            vesum-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Install Cloud Functions dependencies
        run: npm ci --prefix functions

      - name: Dictionary validation regression cases
        run: npm run dict:validate

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage gate
        run: npm run test:coverage

      - name: RTDB security rules tests
        run: npm run test:rules

name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # package-lock.json is built with npm 11; Node 22 images ship npm 10 and `npm ci` fails.
      - name: Use npm 11
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Install Cloud Functions dependencies
        run: npm ci --prefix functions

      - name: Prepare dictionary stubs for typecheck
        run: npm run dict:stub

      - name: Dictionary validation regression cases
        run: npm run dict:validate

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: RTDB security rules tests
        run: npm run test:rules

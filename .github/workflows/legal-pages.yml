name: Legal pages (GitHub Pages)

on:
  push:
    branches: [main, dev]
    paths:
      - 'docs/legal/**'
      - 'scripts/build-legal-pages.ts'
      - '.github/workflows/legal-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: legal-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use npm 11
        run: npm install -g npm@11.6.2

      - name: Install dependencies
        run: npm ci

      - name: Build legal HTML pages
        run: npm run legal:pages

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: assets/generated/legal-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
